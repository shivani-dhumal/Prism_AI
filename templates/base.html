<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PrismAI - Code Analysis{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- FontAwesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <!-- Shared Stylesheets -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  {% block extra_css %}{% endblock %}

  <script src="{{ url_for('static', filename='js/api.js') }}"></script>
</head>
<body>
<header class="header">
  <div class="header-left">
    <div class="logo">
      <i class="fas fa-shield-alt"></i> PrismAI
    </div>
    <nav class="nav">
      <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Dashboard</a>
      <a href="/issues" {% if request.path == '/issues' %}class="active"{% endif %}>Issues</a>
      <a href="/audit-report" {% if request.path == '/audit-report' %}class="active"{% endif %}>Audit</a>
      <a href="/dependency-graph" {% if request.path == '/dependency-graph' %}class="active"{% endif %}>Dependencies</a>
      <a href="/chatbot" {% if request.path == '/chatbot' %}class="active"{% endif %}>Chatbot</a>
    </nav>
  </div>
  <div class="header-right">
    <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
      <i class="fas fa-moon"></i>
    </button>
  </div>
</header>

<main class="main-content">
  {% block content %}{% endblock %}
</main>

<script>
  // Dark mode toggle
  const themeToggle = document.getElementById('themeToggle');
  const html = document.documentElement;

  const savedTheme = localStorage.getItem('theme') || 'light';
  if (savedTheme === 'dark') {
    html.classList.add('dark');
    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
  }

  themeToggle.addEventListener('click', () => {
    html.classList.toggle('dark');
    const isDark = html.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
  });
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
